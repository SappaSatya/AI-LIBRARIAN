services:
  - type: web
    name: librarian-ai-backend
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false          # Set manually in Render dashboard
      - key: OPENAI_API_KEY
        sync: false          # Set manually in Render dashboard
      - key: ALLOWED_ORIGINS
        value: https://librarian-ai.vercel.app   # Update after Vercel deploy
